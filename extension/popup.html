<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LinkedIntrovert</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <span class="logo"></span>
      <div>
        <h1>LinkedIntrovert</h1>
        <p class="tagline">LinkedIn, but just for you</p>
      </div>
    </div>

    <div class="toggle-row">
      <span class="toggle-label" id="status-label"> lock in mode </span>
      <label class="switch">
        <input type="checkbox" id="enabled" checked />
        <span class="slider"></span>
      </label>
    </div>

    <ul class="what-hidden">
      <li> Other people's posts</li>
      <li> Likes, reactions, comments</li>
      <li> Notifications &amp; jobs</li>
      <li> Analytics &amp; "who viewed"</li>
      <li> Right-rail noise</li>
    </ul>

    <script src="popup.js"></script>
  </body>
</html>
