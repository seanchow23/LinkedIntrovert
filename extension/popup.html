<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LinkedIntrovert</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>LinkedIntrovert</h1>
    <ul>
      <li>
        <label>
          <input type="checkbox" id="hideComments" />
          Hide comments
        </label>
      </li>
      <li>
        <label>
          <input type="checkbox" id="hideLikes" />
          Hide likes
        </label>
      </li>
      <li>
        <label>
          <input type="checkbox" id="hideWhoViewed" />
          Hide "who viewed your profile"
        </label>
      </li>
    </ul>
    <script src="popup.js"></script>
  </body>
</html>
